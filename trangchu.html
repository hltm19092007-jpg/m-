<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:Arial, sans-serif;
}

/* NAVBAR */

nav{
    position:fixed;
    top:0;
    width:100%;
    background:#222;
    padding:20px;
    text-align:center;
    z-index:1000;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 20px;
}
.dropdown {
    position: relative;
    display: inline-block;
}
.dropdown-content{
    display:none;

    position:absolute;
    top:100%;
    left:50%;
    transform:translateX(-50%);

    min-width:240px;

    background:#fff;

    border-radius:16px;

    box-shadow:
        0 20px 40px rgba(0,0,0,.12);

    border:1px solid #eee;

    overflow:hidden;
}
.dropdown-content a{
    color:#333;
    padding:14px 20px;
    display:block;
    transition:0.25s;
}
.dropdown-content a:hover{
    background:#f5f5f5;
}
.dropdown:hover .dropdown-content {
    display: block;
}
.dropdown-content.active {
    display:block;
}
.dropdown-content li{
    display:block;
}

/* HERO */

.hero{
    height:100vh;

    background:url("https://images.unsplash.com/photo-1506744038136-46273834b3fb")
    center/cover;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    color:white;
    text-shadow:2px 2px 10px black;
}

.hero h1{
    font-size:clamp(2rem, 5vw, 5rem);
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero p{
    margin-top:20px;
    font-size:22px;
}

/* SECTION */

section{
    padding:100px 10%;
}
section {
    scroll-margin-top:100px;
}
section h2{
    margin-bottom:20px;
}

/* GALLERY */

.gallery{
    display: flex;
    gap: 39px; 
    flex-wrap: wrap;
}
.gallery > img, 
.gallery .image-wrapper {
    flex: 1 1 300px;     
    max-width: 500px;       
    height: auto;          
    border-radius: 10px;
    transition: 0.4s;
}


/* SCROLL ANIMATION */

.hidden{
    opacity:0;
    transform:translateY(50px);
    transition:1s;
}

.show{
    opacity:1;
    transform:translateY(0);
}

/* BUTTON */

.btn{
    display:inline-block;

    background:#333;
    color:white;

    padding:12px 24px;

    text-decoration:none;

    border-radius:10px;

    margin-top:20px;
}

/* BACK TO TOP */

.topBtn{

    position:fixed;

    right:20px;
    bottom:20px;

    width:50px;
    height:50px;

    border:none;

    border-radius:50%;

    cursor:pointer;

    display:none;
}

.popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%); 
    background: rgb(208, 189, 189);
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(0,0,0,.4);
    z-index: 1000;

    width: 50vw;          
    height: 50vh;         
    max-width: 100%;   
}
.popup-content {
    display: flex;
    flex-direction: column;
    align-items: center;     
    height: 100%;            
    text-align: center;
    padding: 20px 0;         
}
.popup .btn {
    font-size: 18px;
    padding: 15px 40px;      
    cursor: pointer;
    margin-top: auto;    
    margin-bottom: 5%;;
}
      

@keyframes closePopup {
    0% { transform: scale(1); opacity: 1; }
    40% { transform: scale(1.1); opacity: 1; } 
    100% { transform: scale(0); opacity: 0; }  
}
.closing-animation {
    animation: closePopup 0.4s ease forwards; 
}
@keyframes openPopup {
    0% { transform: scale(0.6); opacity: 0; }
    70% { transform: scale(1.04); opacity: 1; } 
    100% { transform: scale(1); opacity: 1; }   

}
.opening-animation {
    animation: openPopup 0.4s ease forwards; 
}
.gallery .image-wrapper {
    flex: 1 1 280px;      
    max-width: 100%;       
    transition: 0.4s;
    border-radius: 10px;
    overflow: hidden; 
}


.gallery > img:hover,
.gallery .image-wrapper:hover {
    transform: scale(1.05);
}


.gallery .image-wrapper svg {
    display: block;
    width: 100%;
    height: auto; 
}


.che {
    fill: transparent;
    stroke: transparent;
    cursor: pointer; 
}
@media (max-width:768px){
    .gallery{
        flex-direction:column;
    }
    .gallery .image-wrapper{
        flex:0 0 100%;
        width:100%;
    }
     .hero h1{
        font-size:36px;
    }
}


</style>
</head>

<script>

/* HIỆN KHI SCROLL */

const hiddenElements =
document.querySelectorAll(".hidden");

window.addEventListener("scroll",()=>{ hiddenElements.forEach(el=>{ const top = el.getBoundingClientRect().top;

if(top < window.innerHeight-100){

el.classList.add("show");
} else {
    el.classList.remove("show");
}
});
});


/* NÚT LÊN ĐẦU */

const topBtn =
document.getElementById("topBtn");

window.addEventListener("scroll",()=>{

if(window.scrollY > 300){

topBtn.style.display="block";

}else{
topBtn.style.display="none";
}

});

topBtn.addEventListener("click",()=>{ window.scrollTo({top:0,behavior:"smooth"});

});
const popup = document.getElementById("popup");
function showPopup(message) {
    document.getElementById("popupText").innerText = message;
    popup.style.display = "block";
    const content = popup.querySelector(".popup-content");
    content.classList.add("opening-animation");
    setTimeout(() => {
        content.classList.remove("opening-animation");
    }, 400);
}
function closePopup() {
    const content = popup.querySelector(".popup-content");
    content.classList.add("closing-animation");
    setTimeout(() => {
        popup.style.display = "none";
        content.classList.remove("closing-animation");
    }, 400); 
}
const menuBtn = document.getElementById("menuBtn");
const dropdownMenu = document.getElementById("dropdownMenu");

menuBtn.addEventListener("click",(e)=>{
    e.stopPropagation();
    dropdownMenu.classList.toggle("active");
});
document.addEventListener("click",(e)=>{
    if(!menuBtn.contains(e.target)){
        dropdownMenu.classList.remove("active");
    }
});
dropdownMenu.addEventListener("click", () => {
    dropdownMenu.classList.remove("active");
});

</script>
